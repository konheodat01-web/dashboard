<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | nthieucloud.shop</title>
    <meta name="description" content="Central Hub for all personal data scraping and automation tools.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <div id="logo-wrap"></div>
            <h1 id="site-title"><i class="fa-solid fa-layer-group"></i> <span id="site-name">Loading...</span></h1>
            <p>Multitasking Workspace · Isolated Firebase Environments</p>
            <a href="/admin" class="admin-link" title="Admin Panel">
                <i class="fa-solid fa-gear"></i>
            </a>
        </header>

        <main id="app-grid" class="grid">
            <!-- Dynamically rendered from config.json -->
        </main>
    </div>

    <script>
    const DOMAIN = "nthieucloud.shop";

    async function loadDashboard() {
        const res    = await fetch("/api/config");
        const config = await res.json();

        // Update site title & logo
        document.getElementById("site-name").textContent = config.siteName || "Command Center";
        document.title = (config.siteName || "Command Center") + " | " + DOMAIN;

        if (config.logoUrl) {
            document.getElementById("logo-wrap").innerHTML =
                `<img src="${config.logoUrl}" alt="Logo" class="logo">`;
        }

        // Render tool cards
        const grid = document.getElementById("app-grid");
        grid.innerHTML = "";

        config.tools
            .filter(t => t.visible)
            .forEach((tool, index) => {
                const url  = `https://${tool.id}.${DOMAIN}`;
                const card = document.createElement("a");
                card.href        = url;
                card.target      = "_blank"; // Cô lập session Firebase hoàn toàn
                card.rel         = "noopener noreferrer";
                card.className   = "app-card";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="icon-wrapper">
                        <i class="fa-solid ${tool.icon}"></i>
                    </div>
                    <h2>${tool.name}</h2>
                    <div class="launch-btn">
                        Mở ứng dụng <i class="fa-solid fa-arrow-right"></i>
                    </div>
                `;

                grid.appendChild(card);
                setTimeout(() => card.classList.add("animate-in"), 50);
            });
    }

    loadDashboard().catch(err => {
        console.error("Failed to load config:", err);
        document.getElementById("site-name").textContent = "Command Center";
    });
    </script>
</body>
</html>
